version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MAX_CONCURRENT_JOBS=2
      - JOB_TTL_SECONDS=3600
    volumes:
      - ./backend/app:/app/app
      - /tmp/shadowqr:/tmp/shadowqr
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
