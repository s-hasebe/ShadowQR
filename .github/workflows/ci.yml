name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (libzbar0)
        run: sudo apt-get update && sudo apt-get install -y libzbar0 libgl1-mesa-glx

      - name: Install Python deps
        working-directory: backend
        run: pip install ".[dev]"

      - name: Run pytest with coverage
        working-directory: backend
        run: pytest --cov=app --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: frontend
        run: npm install

      - name: Run Vitest
        working-directory: frontend
        run: npm test

  e2e-test:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps for backend
        run: sudo apt-get update && sudo apt-get install -y libzbar0 libgl1-mesa-glx

      - name: Build and start Docker Compose stack
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "Backend ready"; break
            fi
            sleep 5
          done
          echo "Waiting for frontend..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5173; then
              echo "Frontend ready"; break
            fi
            sleep 5
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright and browsers
        working-directory: tests/e2e
        run: npm install && npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: tests/e2e
        run: npm test
        env:
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:8000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs

  build-images:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, e2e-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t shadowqr-backend ./backend

      - name: Build frontend image
        run: docker build -t shadowqr-frontend ./frontend
